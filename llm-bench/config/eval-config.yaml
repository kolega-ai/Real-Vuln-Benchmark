# Evaluation configuration for LLM security scanner benchmark

# Default settings (can be overridden via CLI flags)
defaults:
  runs_per_model: 3
  timeout_seconds: 600        # 10 minutes per run
  max_iterations: 50          # Max agent steps/turns
  max_input_tokens: 100000
  max_output_tokens: 20000
  max_total_cost: 50.0        # Default $50 safety limit (override with --max-total-cost)

# Repos to include (null = all discovered repos)
repos: null

# OpenHands configuration
openhands:
  # Docker sandbox settings
  sandbox:
    image: "realvuln-sandbox:latest"
    memory_limit: "4g"
    cpu_limit: 2
    network_mode: "none"      # No network except LLM API
    read_only_repo: true

  # Agent configuration
  agent:
    name: "CodeActAgent"
    # Tools available to the agent
    tools:
      - read_file
      - list_dir
      - search_dir
      - search_file
      - execute_bash

# Parallelism settings
parallelism:
  max_concurrent_runs: 4      # Max simultaneous OpenHands instances
  retry_on_failure: 1         # Retry failed runs this many times
  retry_delay_seconds: 30
