# Docker Compose for LLM security scanner benchmark
# Builds the sandbox image and provides convenient orchestration

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    image: realvuln-sandbox:latest
    read_only: true
    network_mode: "none"
    mem_limit: 4g
    cpus: 2
    tmpfs:
      - /tmp:size=512m
    volumes:
      - type: bind
        source: ${REPO_PATH:-../../repos/realvuln-pygoat}
        target: /workspace
        read_only: true
